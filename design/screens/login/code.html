<!DOCTYPE html>

<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f7f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-gradient {
            background: linear-gradient(135deg, rgba(47, 95, 141, 0.05) 0%, rgba(74, 120, 167, 0.05) 100%);
        }
        .login-card-shadow {
            box-shadow: 0px 20px 40px rgba(18, 29, 38, 0.05);
        }
    </style>
</head>
<body class="text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/70 backdrop-blur-xl flex justify-center items-center h-16 w-full px-6">
<div class="max-w-7xl w-full flex justify-between items-center">
<span class="text-xl font-bold tracking-tighter text-blue-900 font-headline">StoryWalkers Club</span>
<div class="flex items-center gap-2 px-3 py-1.5 rounded-xl bg-surface-container-high cursor-pointer hover:bg-surface-variant transition-colors duration-300">
<span class="material-symbols-outlined text-sm">language</span>
<span class="text-xs font-semibold tracking-wide uppercase">English</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
</header>
<main class="min-h-screen pt-16 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Atmosphere -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-10 grayscale-[20%]" data-alt="Interior of a grand classic library with high shelves full of books, warm ambient lighting, and dark wood textures in soft focus" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLKZMi4N-1JtTpWI-Rc70zm5mveJUmrvfbPL3hULyGJGS2T0uAl2M6BAGd6uNZHdNbY5yWMBhXUrHGhbcqv9LH73kVw4EmcplwNCAM92WsX6C-cqYtWEunoZ9v3kTz1gbO4yf7xb7vDKZwmzq7aFotO6PGMyqYDwwvoQyo7EhjYT9lalsnlSeirNtd8IMiBkBCoMK5Sf8_xPH58JB6qRLbzuklgE27tvFTymSd0Mavg4pBqvp2ZOMz5NB5Vx7mdM6jNF2oW2thQmdX"/>
<div class="absolute inset-0 hero-gradient"></div>
</div>
<!-- Login Canvas -->
<div class="w-full max-w-md px-6 py-12 z-10">
<div class="bg-surface-container-lowest rounded-full p-10 login-card-shadow border border-white/50">
<div class="text-center mb-10">
<span class="text-xs font-bold uppercase tracking-[0.1em] text-secondary mb-2 block">Welcome Back</span>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline mb-3">Sign in</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">Email/Password, Email link, or Google</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 transition-all duration-300 text-on-surface placeholder:text-outline/50" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant">Password</label>
<a class="text-xs font-semibold text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-4 focus:ring-2 focus:ring-primary/20 transition-all duration-300 text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-full transition-all duration-300 transform hover:scale-[1.01] active:scale-[0.98] login-card-shadow">
                        Sign in with password
                    </button>
</form>
<!-- Dividers -->
<div class="flex items-center my-8">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="mx-4 text-[10px] font-bold uppercase tracking-widest text-outline">or continue with</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Alternative Auth -->
<div class="space-y-4">
<button class="w-full py-3.5 bg-surface-container-lowest border border-outline-variant rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors duration-300">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-bold text-on-surface">Continue with Google</span>
</button>
<button class="w-full py-3.5 bg-surface-container-high/50 text-secondary font-bold text-sm rounded-full hover:bg-surface-container-high transition-colors duration-300">
                        Send sign-in link (passwordless)
                    </button>
<button class="w-full py-3.5 border border-secondary/20 text-secondary font-bold text-sm rounded-full hover:bg-secondary/5 transition-colors duration-300">
                        Create account (email/password)
                    </button>
</div>
</div>
</div>
</main>
<footer class="w-full py-12 px-6 flex flex-col items-center gap-6 bg-surface-container-low/50">
<nav class="flex flex-wrap justify-center gap-x-8 gap-y-2">
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors duration-300" href="#">Help Center</a>
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors duration-300" href="#">Privacy Policy</a>
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors duration-300" href="#">Terms of Service</a>
<a class="text-xs font-bold uppercase tracking-widest text-on-surface-variant hover:text-secondary transition-colors duration-300" href="#">Accessibility</a>
</nav>
<p class="text-[10px] font-medium text-outline uppercase tracking-[0.2em]">
            © 2024 StoryWalkers Club. All rights reserved.
        </p>
</footer>
</body></html>
